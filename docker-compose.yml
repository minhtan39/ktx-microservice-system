services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ktx-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD:-KtxServer@2026Demo!}"
      MSSQL_PID: "Express"
      MSSQL_MEMORY_LIMIT_MB: "2048"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  auth-service:
    build:
      context: ./AuthService
    container_name: ktx-auth-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Accounts__DataFile: "/app/data/accounts.json"
      PasswordReset__DataFile: "/app/data/password-reset-tokens.json"
      PasswordReset__LifetimeMinutes: "30"
      Frontend__BaseUrl: "${FRONTEND_BASE_URL:-http://103.188.242.37}"
      AdminBootstrap__Username: "${ADMIN_USERNAME:-admin}"
      AdminBootstrap__Password: "${ADMIN_PASSWORD:-admin123}"
      AdminBootstrap__FullName: "${ADMIN_FULL_NAME:-Quản trị hệ thống}"
      Jwt__Key: "${JWT_KEY:-THIS_IS_SUPER_SECRET_KEY_123456789}"
      Jwt__Issuer: "${JWT_ISSUER:-SmartDormitory}"
      Jwt__Audience: "${JWT_AUDIENCE:-SmartDormitoryUsers}"
      InternalService__ApiKey: "${INTERNAL_SERVICE_KEY:-CHANGE_THIS_INTERNAL_SERVICE_KEY}"
      Email__SmtpHost: "smtp.gmail.com"
      Email__SmtpPort: "587"
      Email__EnableSsl: "true"
      Email__Username: "${GMAIL_USERNAME:-}"
      Email__Password: "${GMAIL_APP_PASSWORD:-}"
      Email__FromEmail: "${GMAIL_USERNAME:-}"
      Email__FromName: "DormManager"
    volumes:
      - auth-data:/app/data

  room-service:
    build:
      context: ./RoomService
    container_name: ktx-room-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      RoomData__FilePath: "/app/data/room-data.json"
    volumes:
      - room-data:/app/data

  billing-service:
    build:
      context: ./BillingService
    container_name: ktx-billing-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      BillingData__FilePath: "/app/data/billing-data.json"
      Email__SmtpHost: "smtp.gmail.com"
      Email__SmtpPort: "587"
      Email__EnableSsl: "true"
      Email__Username: "${GMAIL_USERNAME:-}"
      Email__Password: "${GMAIL_APP_PASSWORD:-}"
      Email__FromEmail: "${GMAIL_USERNAME:-}"
      Email__FromName: "DormManager Billing"
      Payment__BankCode: "${PAYMENT_BANK_CODE:-}"
      Payment__AccountNumber: "${PAYMENT_ACCOUNT_NUMBER:-}"
      Payment__AccountName: "${PAYMENT_ACCOUNT_NAME:-}"
      Payment__QrTemplate: "compact2"
      Payment__WebhookSecret: "${PAYMENT_WEBHOOK_SECRET:-}"
    volumes:
      - billing-data:/app/data

  contract-student-service:
    build:
      context: ./ContractStudentService
    container_name: ktx-contract-student-service
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SmartDormitory_ContractStudentDB;User Id=sa;Password=${SQL_SA_PASSWORD:-KtxServer@2026Demo!};TrustServerCertificate=True;Encrypt=False"
      Integration__GatewayBaseUrl: "http://api-gateway:8080"
      Database__AutoMigrate: "true"
      Auth__DisableForLocalDemo: "false"
      Jwt__Key: "${JWT_KEY:-THIS_IS_SUPER_SECRET_KEY_123456789}"
      Jwt__Issuer: "${JWT_ISSUER:-SmartDormitory}"
      Jwt__Audience: "${JWT_AUDIENCE:-SmartDormitoryUsers}"
      InternalService__ApiKey: "${INTERNAL_SERVICE_KEY:-CHANGE_THIS_INTERNAL_SERVICE_KEY}"
      Frontend__BaseUrl: "${FRONTEND_BASE_URL:-http://103.188.242.37}"
      Email__SmtpHost: "smtp.gmail.com"
      Email__SmtpPort: "587"
      Email__EnableSsl: "true"
      Email__Username: "${GMAIL_USERNAME:-}"
      Email__Password: "${GMAIL_APP_PASSWORD:-}"
      Email__FromEmail: "${GMAIL_USERNAME:-}"
      Email__FromName: "DormManager Contract"
    volumes:
      - contract-files:/app/Data/contract-files

  api-gateway:
    build:
      context: ./ApiGateway
    container_name: ktx-api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - room-service
      - billing-service
      - contract-student-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ServiceRoutes__AuthService: "http://auth-service:8080"
      ServiceRoutes__RoomService: "http://room-service:8080"
      ServiceRoutes__BillingService: "http://billing-service:8080"
      ServiceRoutes__ContractStudentService: "http://contract-student-service:8080"
      Jwt__Key: "${JWT_KEY:-THIS_IS_SUPER_SECRET_KEY_123456789}"
      Jwt__Issuer: "${JWT_ISSUER:-SmartDormitory}"
      Jwt__Audience: "${JWT_AUDIENCE:-SmartDormitoryUsers}"
      InternalService__ApiKey: "${INTERNAL_SERVICE_KEY:-CHANGE_THIS_INTERNAL_SERVICE_KEY}"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./QLKTX
      args:
        VITE_API_BASE_URL: "/api"
    container_name: ktx-frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "80:80"

volumes:
  sqlserver-data:
  auth-data:
  billing-data:
  room-data:
  contract-files:
